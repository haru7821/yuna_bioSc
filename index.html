<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고2 생명과학Ⅰ 퀴즈 & 30일 챌린지</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="고등학교 2학년 생명과학Ⅰ 핵심 퀴즈 및 30일 완성 챌린지 학습 플랫폼">
  <meta name="keywords" content="생명과학1, 고2 생명과학, 생명과학 퀴즈, 30일 챌린지, 신경계, 항상성, 유전">
  
  <!-- Styling -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="app-sidebar">
      <div>
        <div class="brand-section">
          <div class="brand-icon">🧬</div>
          <div>
            <h2 class="brand-title">생명과학Ⅰ</h2>
            <p class="brand-subtitle">고2 모의고사 & 항상성 케어</p>
          </div>
        </div>
        
        <nav>
          <ul class="sidebar-navigation" id="sidebar-navigation">
            <!-- Dynamic menu items will be rendered here from TABS list in app.js -->
          </ul>
        </nav>
      </div>

      <div class="sidebar-footer">
        <div class="footer-info">
          <p>© 2026 Life Science Master</p>
          <p style="font-size: 0.7rem; margin-top: 4px; color: var(--text-muted);">수능 대비 30일 프로젝트</p>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Quiz Panel (active by default) -->
      <section id="quiz-view" class="view-panel active">
        <!-- Rendered dynamically by app.js -->
      </section>

      <!-- 30-Day Challenge Panel -->
      <section id="challenge-view" class="view-panel">
        <!-- Rendered dynamically by app.js -->
      </section>

    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav" id="app-bottom-nav">
      <button class="bottom-nav-item active" data-tab="quiz">
        <i data-lucide="help-circle"></i>
        <span>퀴즈 학습</span>
      </button>
      <button class="bottom-nav-item" data-tab="challenge">
        <i data-lucide="calendar"></i>
        <span>30일 챌린지</span>
      </button>
    </nav>

  </div>

  <!-- Include Data Modules and App Scripts -->
  <script src="questions.js"></script>
  <script src="challenge.js"></script>
  <script src="app.js"></script>
</body>
</html>
